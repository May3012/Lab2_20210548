<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha2/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-aFq/bzH65dt+w6FI2ooMVUpc+21e0SRygnTpmBvdBgSdnuTN7QbdgL+OapgHtvPp"
          crossorigin="anonymous">
    <title>Jugar</title>
</head>
<body class="container">
<div class="container">
    <br>
    <br>
    <h1>STF GAMES: El juego de las minas explosivas</h1>
    <br>
    <br>

<form>
    <div class="form-group row">
        <label for="inputfilas3" class="col-sm-2 col-form-label">Número de filas:</label>
        <div class="col-sm-10">
            <input type="text" class="form-control" id="inputfilas3" placeholder="Filas">
        </div>
    </div>
    <br>
    <div class="form-group row">
        <label for="inputcolumnas3" class="col-sm-2 col-form-label">Número de columnas:</label>
        <div class="col-sm-10">
            <input type="text" class="form-control" id="inputcolumnas3" placeholder="Columnas">
        </div>
    </div>
    <br>
    <div class="form-group row">
        <label for="inputIntentos3" class="col-sm-2 col-form-label">Número de intentos:</label>
        <div class="col-sm-10">
            <input type="text" class="form-control" id="inputIntentos3" placeholder="Intentos">
        </div>
    </div>
    <br>
    <div class="form-group row">
        <label for="inputBombas3" class="col-sm-2 col-form-label">Número de bombas:</label>
        <div class="col-sm-10">
            <input type="text" class="form-control" id="inputBombas3" placeholder="Bombas">
        </div>
    </div>
    <br>
    <div class="form-group row">
        <label for="inputPosicionBomba3" class="col-sm-2 col-form-label">Posiciones de las bombas:</label>
        <div class="col-sm-10">
            <input type="text" class="form-control" id="inputPosicionBomba3" placeholder="(x,y) (w,z) (q,r)">
        </div>
    </div>
    <br>
    <div class="form-group row">
        <div class="col-sm-10">
            <button type="submit" class="btn btn-primary">Iniciar Juego</button>
        </div>
    </div>
</form>
</div>
</body>
</html>
