<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha2/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-aFq/bzH65dt+w6FI2ooMVUpc+21e0SRygnTpmBvdBgSdnuTN7QbdgL+OapgHtvPp"
          crossorigin="anonymous">
    <title>STF GAMES: Configuración del juego</title>
</head>
<body class="container">
<div class="container">
    <br>
    <br>
    <h1>STF GAMES: El juego de las minas explosivas</h1>
    <br>
    <br>
    <form action="/buscaminas"  th:object="${tableroForm}" method="post">
        <div class="form-group row">
            <label for="filas"class="col-sm-2 col-form-label">Número de filas:</label>
            <div class="col-sm-10">
                <input type="number" class="form-control" id="filas" name="filas" placeholder="Filas" required min="1" >
            </div>
        </div>
        <br>
        <div class="form-group row">
            <label for="columnas" class="col-sm-2 col-form-label">Número de columnas:</label>
            <div class="col-sm-10">
                <input type="number" class="form-control" id="columnas" name="columnas"  placeholder="Columnas" required min="1">
            </div>
        </div>
        <br>
        <div class="form-group row">
            <label for="intentos" class="col-sm-2 col-form-label">Número de intentos:</label>
            <div class="col-sm-10">
                <input type="number" class="form-control" id="intentos" name="intentos" placeholder="Intentos"  min="1" required>
            </div>
        </div>
        <br>
        <div class="form-group row">
            <label for="bombas" class="col-sm-2 col-form-label">Número de bombas:</label>
            <div class="col-sm-10">
                <input type="number" class="form-control" id="bombas" name="bombas" placeholder="Bombas"  min="1" required>
            </div>
        </div>
        <br>
        <div class="form-group row">
            <label for="bombasCoordenadas" class="col-sm-2 col-form-label">Posiciones de las bombas:</label>
            <div class="col-sm-10">
                <input type="text" class="form-control" id="bombasCoordenadas" name="bombasCoordenadas"  required>
            </div>
        </div>
        <br>
        <div class="form-group row">
            <div class="col-sm-10">
                <button type="submit" class="btn btn-primary">Iniciar Juego</button>
            </div>
        </div>

    </form>
</div>
</body>
</html>
